{% extends "base/myjob_base.html" %}
{% block body %}
    <form method="post">
       {% csrf_token %}
       <p>このページを削除していいですか？</p>
       <button type="submit">削除</button>
    </form>

<h2>{{ page.title }}</h2>

<div>{{ page.Page_date }}</div>

<div>{{ page.body|linebreaksbr }}</div>
{% if page.picture %}
    <img src="{{ page.picture.url}}"/>
{% endif %}
{% endblock %}
